<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- This for text-fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <!-- This for icons -->
    <link
      rel="stylesheet"
      href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css"
    />

    <title>Guess My Number</title>
  </head>
  <body>
    <header>
      <div class="top-header">
        <p class="highscore-label">
          HighScore: <span class="highscore">0</span>
        </p>
        <p class="btn-hint">(Between 1 and 20)</p>
      </div>

      <h1 class="title">Guess My Number</h1>

      <div class="guess-box">
        <p><i class="las la-question"></i></p>
      </div>
    </header>
    <main>
      <section class="left">
        <p class="message">Start Guessing...</p>
        <input
          class="input-number"
          type="number"
          name="number"
          min="0"
          max="20"
        />
        <div class="check-box">
          <i class="las la-check"></i>
        </div>
      </section>
      <section class="right">
        <p class="score-label">Score: <span class="score">0</span></p>
        <button class="again-button">AGAIN</button>
      </section>
    </main>
  </body>
</html>
